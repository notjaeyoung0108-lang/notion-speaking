# poses.yaml
#
# Illustrious/Danbooru-friendly motion menu.
# Visual generation chooses exactly one body_pose and at most one gesture.
# The code combines them into the legacy "action" tag string for SD prompts.

body_poses:
  standing:
    tags: standing
    use_when: neutral standing pose, default for most conversation panels
  sitting:
    tags: sitting
    use_when: seated at a desk, cafe table, classroom, or waiting area
  leaning_forward:
    tags: leaning forward
    use_when: focused explanation, urgency, asking, pressure, leaning into a conversation
  walking:
    tags: walking
    use_when: moving through a hall, store aisle, street, or workplace
  crouching:
    tags: crouching
    use_when: looking for something low, checking a shelf, picking something up

gestures:
  none:
    tags: ""
    use_when: body pose alone is clearer; avoid unnecessary hand conflict
  arms_crossed:
    tags: crossed arms
    use_when: guarded, skeptical, stubborn, waiting, mildly defensive
  hands_on_hips:
    tags: hands on hips
    use_when: confident, impatient, supervisor-like, mock authority
  pointing:
    tags: pointing
    use_when: indicating a person, object, board, receipt, or visible mistake
  pointing_at_screen:
    tags: pointing at screen
    use_when: explaining something on a monitor, phone, kiosk, or displayed document
  hand_on_chin:
    tags: hand on own chin
    use_when: thinking, reconsidering, trying to understand
  hand_on_forehead:
    tags: hand on own forehead
    use_when: overwhelmed, embarrassed, light regret
  facepalm:
    tags: facepalm
    use_when: obvious mistake, comic regret, disbelief
  head_in_hands:
    tags: head down, hands on own head
    use_when: overwhelmed or mentally collapsing
  shrug:
    tags: shrug
    use_when: unsure, helpless, casual deflection
  hand_raised:
    tags: hand up
    use_when: asking a question, volunteering, interrupting politely
  waving:
    tags: waving
    use_when: greeting, getting attention, calling someone over
  hands_clasped:
    tags: own hands together
    use_when: pleading, hopeful request, nervous politeness
  holding_cup:
    tags: holding cup
    use_when: cafe, break room, casual talk, waiting
  holding_phone:
    tags: holding phone
    use_when: call, text, schedule, message, notification
  holding_paper:
    tags: holding paper
    use_when: notes, receipt, report, form, printed agenda
  holding_laptop:
    tags: holding laptop
    use_when: showing work, carrying a laptop, checking a task
  typing:
    tags: typing
    use_when: working at a computer or laptop

# Legacy combined menu kept for backward compatibility with older tools.
poses:
  standing:
    tags: standing
    use_when: neutral standing pose
  sitting:
    tags: sitting
    use_when: seated conversation
  leaning_forward:
    tags: leaning forward
    use_when: focused or urgent conversation
  arms_crossed:
    tags: crossed arms
    use_when: guarded or skeptical gesture
  hands_on_hips:
    tags: hands on hips
    use_when: confident or impatient gesture
  pointing:
    tags: pointing
    use_when: indicating something visible
  holding_paper:
    tags: holding paper
    use_when: notes, report, receipt, agenda
