# ─────────────────────────────────────────────────────────
# characters.yaml — 캐릭터 정의 (prompts.py CHARS 의 단일 소스)
#
# 각 캐릭터:
#   lora            : LoRA 경로
#   appearance_tags : 트리거워드 외 외형 태그 (눈 등 — 머리는 hair 로 분리)
#   hair            : 머리 (색+스타일)
#   body_tags       : 체형/피부 태그
#   action          : 기본 포즈 (씬별로 GPT가 덮어씀)
#   face_state      : 기본 시선 (씬별로 GPT가 덮어씀)
#   expression      : 기본 표정 (단독 이미지/폴백용. 4컷은 GPT가 expressions.yaml 에서 선택)
#   outfits         : 의상 세트 (캐릭터별로 다름)
#       outfit        : 옷 (고정)
#       state         : 노출/맨살 상태 태그 (cleavage, navel, midriff …)
#       props         : 소품
#       hair_override : 이 의상에 어울리는 머리 (기본 머리 대신)
#   비어 있는 state/props/hair_override 는 생략된다.
#
# ── 의상 key = setting 접두어 + 번호 (selection 코드가 접두어로 필터) ──
#   workplace_N        : 사무실 (정장/사무실 캐주얼 …)
#   daily_home_N       : 집 안 (집옷)
#   daily_convenience_N: 편의점·근처 외출용 가벼운 복장
#   daily_sport_N      : 운동
#   daily_outing_N     : 일상 외출 (카페/약속)
#   daily_dressup_N    : 꾸미고 가는 외출 (데이트/모임)
#   academic_N         : 학원 회상 (교복) — config_loader.FLASHBACK_OUTFITS
#   ⚠️ 의상 key 1개가 그 화 전원에게 적용된다. 등장 캐릭터 전원이 공통으로 가진
#      key 중 setting 접두어로 시작하는 것에서 고른다(없으면 daily_outing 폴백).
#      → 모든 캐릭터가 가진 접두어_1 은 항상 쓰이고, 한 명만 가진 _2 는 그 캐릭터 단독 씬에서만.
# ─────────────────────────────────────────────────────────

